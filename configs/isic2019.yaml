paths:
  dataset_path: "./data"
  logs_path: "./logs"
  results_path: "./results"

dataset:
  dataset_type: "image"  # "image", "text"
  dataset_name: "ISIC2019"  # "ISIC2019", "ChestX", "MNIST"
  train_images_per_class: [1, 2, 5, 10, 20, 50, 100, -1]
  img_size : 224
  test_size: 0.2
  val_size: 0.2
  files_size: 8000
  use_minibatch: true
  without_valid: false

graph:
  K_neigh: 3
  K_hop_list: [1, 2, 3, 4, 5]
  graph_refresh: 1
  rebuild_graph_each_epoch: true

training:
  train_mode: "full" # "full", "embedding_only"
  embedding: "resnet50" #cnn, resnet18, resnet50
  gnn_model: "gatv2conv" # gcnconv, gatv2conv
  lr_embedder: 0.0003
  lr_gcn: 0.0003
  epochs_max: 2500
  batch_size: 128
  criterion: "cross_entropy" # "cross_entropy", "focal_loss"
  metrics: "macro_f1" # "accuracy", "macro_f1"
  patience: 100
  delta: 0.001
  use_class_weights: true
  
similarity:
  # method_similar: "p_norm"
  # p_n_vectors: [1, 2, 3]

model:
  latens_size: 64
  model_embedder_save_path: "./models/checkpoints/"

reproducibility:
  seed: 42