paths:
  dataset_path: "./data"
  logs_path: "./logs"
  results_path: "./results"

dataset:
  dataset_type: "text"  # "image", "text"
  dataset_name: "AGNews"  # "AGNews", "DBpedia",
  train_images_per_class: [1, 2, 5, 10, 20, 50, 100, -1] # -1 means using all available images for training
  img_size : 0
  test_size: 0.2
  use_minibatch: true
  without_valid: false

graph:
  K_neigh: 3
  K_hop_list: [1, 2, 3, 4, 5]
  graph_refresh: 10
  rebuild_graph_each_epoch: true

training:
  train_mode: "embedding_only" # "full", "embedding_only"
  embedding: "qwen" #bert, qwen
  gnn_model: "gatv2conv" # gcnconv, gatv2conv
  lr_embedder: 0.0003
  lr_gcn: 0.0003
  epochs_max: 1000
  batch_size: 32 #Neighbor sampling
  criterion: "cross_entropy" # "cross_entropy", "focal_loss"
  metrics: "accuracy" # "accuracy", "macro_f1"
  patience: 100
  delta: 0.001

similarity:
  # method_similar: "p_norm"
  # p_n_vectors: [1, 2, 3]

model:
  latens_size: 64
  model_embedder_save_path: "./models/checkpoints/"
reproducibility:
  seed: 42